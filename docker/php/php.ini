; SQLCraft dev PHP configuration

; Error reporting — verbose during development
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On

; Memory — generous for PHPStan/Psalm which are hungry
memory_limit = 1G

; pcov — only activates when PCOV_ENABLED=1 is set (via phpunit's env),
; keeps overhead zero during normal interactive use
[pcov]
pcov.enabled = 0

; OPcache off — CLI tools don't benefit, and it can hide stale-file bugs
opcache.enable_cli = 0

; Timezone
date.timezone = UTC
